name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - name: Build
        run: cargo build --locked --release --manifest-path engine/Cargo.toml --target ${{ matrix.target }}
      - name: Package Unix binary
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          mkdir -p dist/package
          cp "engine/target/${{ matrix.target }}/release/xsearch" dist/package/xsearch
          tar -C dist/package -czf "dist/xsearch-${{ matrix.target }}.tar.gz" xsearch
      - name: Package Windows binary
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/package | Out-Null
          Copy-Item "engine/target/${{ matrix.target }}/release/xsearch.exe" "dist/package/xsearch.exe"
          Compress-Archive -Path "dist/package/xsearch.exe" -DestinationPath "dist/xsearch-${{ matrix.target }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: xsearch-${{ matrix.target }}
          path: dist/xsearch-*
          if-no-files-found: error

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create checksums
        working-directory: dist
        run: sha256sum xsearch-* > checksums.txt
      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "xsearch $TAG" --generate-notes
          gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
