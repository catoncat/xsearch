name: CI

on:
  push:
    paths:
      - "engine/**"
      - "install.sh"
      - "install.ps1"
      - "scripts/**"
      - "config.example.toml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
  pull_request:
    paths:
      - "engine/**"
      - "install.sh"
      - "install.ps1"
      - "scripts/**"
      - "config.example.toml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"

permissions:
  contents: read

jobs:
  rust:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - run: cargo fmt --check
      - run: cargo test --locked
      - run: cargo check --locked
      - name: Validate Bash installers
        if: runner.os != 'Windows'
        run: bash -n ../install.sh ../scripts/install.sh ../scripts/test-installer.sh
      - name: Validate PowerShell installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path ../install.ps1), [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }
      - name: Test binary installer
        if: runner.os == 'Linux'
        run: |
          cargo build --locked --release
          ../scripts/test-installer.sh
